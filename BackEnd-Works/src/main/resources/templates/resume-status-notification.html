<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật trạng thái ứng tuyển</title>
</head>

<body
    style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background-color: #fef3e2; margin: 0; padding: 0;">

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #fef3e2;">
        <tr>
            <td align="center" style="padding: 40px 20px;">

                <!-- Main Container -->
                <table role="presentation" width="560" cellspacing="0" cellpadding="0"
                    style="background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">

                    <!-- Header -->
                    <tr>
                        <td align="center"
                            style="background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); padding: 32px 24px; border-radius: 16px 16px 0 0;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 22px; font-weight: 700;"
                                th:text="${statusIcon} + ' Cập nhật trạng thái ứng tuyển'"></h1>
                            <p style="color: rgba(255,255,255,0.9); font-size: 13px; margin: 8px 0 0 0;">TalentBridge -
                                Hệ thống tuyển dụng IT</p>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 28px 32px 20px;">
                            <p style="color: #1f2937; font-size: 16px; margin: 0 0 8px 0; font-weight: 600;">Xin chào,
                            </p>
                            <p style="color: #6b7280; font-size: 14px; margin: 0; line-height: 1.6;">Hồ sơ ứng tuyển của
                                bạn đã có cập nhật mới từ nhà tuyển dụng:</p>
                        </td>
                    </tr>

                    <!-- Job Info -->
                    <tr>
                        <td style="padding: 0 32px 20px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="background-color: #fff7ed; border-radius: 12px; border: 1px solid #fed7aa;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td width="44" valign="top">
                                                    <div
                                                        style="width: 40px; height: 40px; background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 10px; text-align: center; line-height: 40px; font-size: 20px;">
                                                        💼</div>
                                                </td>
                                                <td style="padding-left: 12px;" valign="top">
                                                    <p
                                                        style="color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 4px 0; font-weight: 600;">
                                                        Vị trí ứng tuyển</p>
                                                    <p style="color: #1f2937; font-size: 16px; font-weight: 700; margin: 0;"
                                                        th:text="${jobName}"></p>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td colspan="2"
                                                    style="padding-top: 16px; border-top: 1px solid #fed7aa; margin-top: 16px;">
                                                    <table role="presentation" width="100%" cellspacing="0"
                                                        cellpadding="0" style="margin-top: 16px;">
                                                        <tr>
                                                            <td width="44" valign="top">
                                                                <div
                                                                    style="width: 40px; height: 40px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border-radius: 10px; text-align: center; line-height: 40px; font-size: 20px;">
                                                                    🏢</div>
                                                            </td>
                                                            <td style="padding-left: 12px;" valign="top">
                                                                <p
                                                                    style="color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 4px 0; font-weight: 600;">
                                                                    Công ty</p>
                                                                <p style="color: #374151; font-size: 15px; font-weight: 600; margin: 0;"
                                                                    th:text="${companyName}"></p>
                                                            </td>
                                                        </tr>
                                                    </table>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Status -->
                    <tr>
                        <td style="padding: 0 32px 20px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="background-color: #ffffff; border-radius: 12px; border: 2px solid #e5e7eb;">
                                <tr>
                                    <td align="center" style="padding: 24px;">
                                        <div
                                            style="height: 4px; background: linear-gradient(90deg, #f97316, #fbbf24); border-radius: 2px; margin-bottom: 16px;">
                                        </div>
                                        <p
                                            style="color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px 0; font-weight: 700;">
                                            Trạng thái mới</p>
                                        <p style="font-size: 28px; font-weight: 800; margin: 0;"
                                            th:style="'color:' + ${statusColor}"
                                            th:text="${statusIcon} + ' ' + ${statusText}"></p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Message -->
                    <tr>
                        <td style="padding: 0 32px 24px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="background-color: #eff6ff; border-radius: 10px; border-left: 4px solid #3b82f6;">
                                <tr>
                                    <td style="padding: 16px 20px;">
                                        <p style="color: #1e40af; font-size: 14px; line-height: 1.6; margin: 0;"
                                            th:text="${message}"></p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- CTA Button -->
                    <tr>
                        <td align="center" style="padding: 0 32px 28px;">
                            <a href="http://localhost:3000/resumes"
                                style="display: inline-block; background: linear-gradient(135deg, #f97316, #ea580c); color: #ffffff; text-decoration: none; padding: 14px 36px; border-radius: 8px; font-weight: 600; font-size: 14px;">
                                📋 Xem chi tiết hồ sơ →
                            </a>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center"
                            style="padding: 24px 32px; background-color: #f9fafb; border-radius: 0 0 16px 16px; border-top: 1px solid #e5e7eb;">
                            <p style="color: #6b7280; font-size: 12px; margin: 0 0 12px 0;">📧 Email tự động - vui lòng
                                không trả lời</p>
                            <p style="color: #f97316; font-size: 14px; font-weight: 700; margin: 0;">TalentBridge</p>
                            <p style="color: #9ca3af; font-size: 11px; margin: 8px 0 0 0;">© 2024 TalentBridge. All
                                rights reserved.</p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
